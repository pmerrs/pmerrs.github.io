<!DOCTYPE html>
<html lang="en" data-mode="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pm</title>
  <meta name="description" content="hello those are my social media accs">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400&display=swap" rel="stylesheet">
  
  <!-- Style Link -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Main Container matching Figma -->
  <div class="hub-container">
    
    <!-- Profile Card (Top Block) -->
    <header class="profile-card">
      <div class="profile-avatar">
        <img src="pm.png" alt="pm" class="profile-avatar-img">
      </div>
      <div class="profile-details">
        <h1 class="profile-name">pm</h1>
        <p class="profile-bio">hello those are my social media accs</p>
      </div>
    </header>

    <!-- Social Links Stack (Middle Block) -->
    <main class="links-card" id="links-stack">
      <!-- Loaded dynamically via JavaScript to support SVG async fetch -->
    </main>

    <!-- Footer Card (Bottom Block) -->
    <footer class="footer-card">
      <p class="footer-text">copyright 2024-2026. all rights reserved.</p>
    </footer>

  </div>

  <!-- Scripts -->
  <script src="js/links.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
